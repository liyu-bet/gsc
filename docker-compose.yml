services:
  postgres:
    image: postgres:16
    container_name: gsc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gsc_dashboard
      POSTGRES_USER: gsc
      # Совпадает с паролем в DATABASE_URL в .env; по умолчанию как раньше
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gscpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsc -d gsc_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gsc-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  postgres_data:
